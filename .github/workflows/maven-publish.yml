name: Build All Modules

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      skip-upload:
        description: '跳过上传到 Release'
        required: false
        default: false
        type: boolean
      build-type:
        description: '构建类型'
        required: false
        default: 'release'
        type: choice
        options:
        - debug
        - release
        - test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # 关键：拉取所有子模块代码
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: 'maven'  # 缓存依赖，加速构建

      - name: Build all modules with Maven
        run: |
          mvn clean package -B -DskipTests
        # 说明：在根目录执行，会自动递归构建所有子模块

      - name: Upload all module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: All-Modules-Jars
          path: |
            **/target/*.jar
            !**/original-*.jar  # 排除 Maven 生成的原始未重命名的 jar

      - name: Upload to Release (if needed)
        if: github.event_name == 'release' && (github.event_name != 'workflow_dispatch' || !github.event.inputs.skip-upload)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/target/*.jar
            !**/original-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
