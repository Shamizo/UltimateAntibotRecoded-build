name: Build Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:  # 添加手动触发
    inputs:
      skip-upload:
        description: '跳过上传到Release'
        required: false
        default: false
        type: boolean
      build-type:
        description: '构建类型'
        required: false
        default: 'release'
        type: choice
        options:
        - debug
        - release
        - test

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up JDK
      uses: actions/setup-java@v2
      with:
        java-version: '21'
        distribution: 'adopt'
        
    - name: Build with Maven
      run: mvn -B package
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Plugin
        path: target/*.jar
        
    - name: Upload to release
      if: github.event_name == 'release' && (github.event_name != 'workflow_dispatch' || !github.event.inputs.skip-upload)
      uses: softprops/action-gh-release@v1
      with:
        files: target/*.jar
